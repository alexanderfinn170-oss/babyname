<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>নবজাতক আরবি নাম জেনারেটর</title>
<meta name="description" content="আপনার সন্তানদের জন্য সুন্দর আরবি নাম জেনারেট করুন। ছেলে বা মেয়ের জন্য নাম এবং বাবা/মায়ের নাম অনুযায়ী ইবনে/বিনতে সহ।">
<meta name="keywords" content="আরবি নাম, নবজাতক নাম, বেবি নাম জেনারেটর, ইসলামিক নাম">
<style>
body {margin:0; font-family: Arial,sans-serif; background:#f0f4f8;}
header{background:#2563eb; color:white; padding:25px; text-align:center;}
header h1{margin:0;font-size:2em;}
header p{margin:5px 0 0;}
.container{max-width:700px; margin:auto; padding:20px;}
.card{background:white; padding:20px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
input, select{width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px; font-size:1em;}
button{background:#2563eb; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; margin-top:10px; font-size:1em;}
button:hover{background:#1e40af;}
ul{padding-left:20px; margin-top:10px;}
footer{background:#111827;color:white;text-align:center;padding:15px; margin-top:20px;}
h2{color:#111827;}
</style>
</head>
<body>

<header>
<h1>নবজাতক আরবি নাম জেনারেটর</h1>
<p>আপনার নাম লিখুন, বাবা না মা সিলেক্ট করুন এবং বেবির লিঙ্গ অনুযায়ী নাম জেনারেট করুন।</p>
</header>

<div class="container">
<div class="card">
<h2>নাম জেনারেটর</h2>

<label>আপনার সম্পূর্ণ নাম (বাংলা অক্ষরে):</label>
<input type="text" id="parentName" placeholder="আপনার নাম লিখুন">

<label>আপনি কোনটি? :</label>
<select id="parentType">
  <option value="father">বাবা</option>
  <option value="mother">মা</option>
</select>

<label>বেবির লিঙ্গ :</label>
<select id="babyGender">
  <option value="boy">ছেলে</option>
  <option value="girl">মেয়ে</option>
</select>

<button onclick="generateNames()">নাম জেনারেট করুন</button>

<h3>সাজেশন:</h3>
<ul id="nameResults"></ul>
</div>
</div>

<footer>
<p>© ২০২৬ নবজাতক আরবি নাম জেনারেটর | সকল অধিকার সংরক্ষিত</p>
</footer>

<script>
// Sample 200+ boy & girl Arabic names (shortened for demo, full 200+ replace)
const boyNames = [
"আদনান","আমির","আরিফ","ফারহান","ইহসান","জাহিদ","মেহদি","রাহিম","সইফ","ইসমাইল",
"তামিম","মুজাহিদ","হাকিম","জিয়াদ","সুলেমান","নাহিদ","তাহির","সামির","হাসান","রাশিদ"
];
const girlNames = [
"ফাতিমা","আইশা","সুমাইয়া","রাবেয়া","মাহিন","সাফিয়া","নাজমা","তাহমিনা","হুমায়রা","নূর",
"জাহানারা","সালমা","আনিসা","রাহিলা","সাবিনা","ফারজানা","নিশাত","হাসিনা","জুমাইনা","রাইয়া"
];

// Generate function
function generateNames(){
  const parentName = document.getElementById('parentName').value.trim();
  const parentType = document.getElementById('parentType').value;
  const babyGender = document.getElementById('babyGender').value;
  const resultUl = document.getElementById('nameResults');
  resultUl.innerHTML = "";

  if(!parentName){
    alert("আপনার নাম লিখুন।");
    return;
  }

  const namesArray = babyGender === "boy"? boyNames : girlNames;
  const suggestions = [];

  while(suggestions.length < 10){
    const randomName = namesArray[Math.floor(Math.random()*namesArray.length)];
    let fullName = "";

    if(parentType==="father" && babyGender==="boy"){
      fullName = randomName + " ইবনে " + parentName;
    } else if(parentType==="mother" && babyGender==="girl"){
      fullName = randomName + " বিনতে " + parentName;
    } else {
      // default: just name
      fullName = randomName;
    }

    if(!suggestions.includes(fullName)){
      suggestions.push(fullName);
    }
  }

  // Display results
  suggestions.forEach(n=>{
    const li = document.createElement('li');
    li.textContent = n;
    resultUl.appendChild(li);
  });
}
</script>

</body>
</html>

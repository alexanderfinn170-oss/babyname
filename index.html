<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বাংলাদেশি বেবি নেম জেনারেটর</title>
<meta name="description" content="বাবা ও মায়ের নাম অনুযায়ী সুন্দর বাংলাদেশের শিশুদের নাম জেনারেট করুন।">
<meta name="keywords" content="বাংলাদেশি বেবি নাম, বাচ্চার নাম, শিশু নাম, নেম জেনারেটর">
<style>
body {margin:0; font-family: Arial,sans-serif; background:#f0f4f8;}
header{background:#2563eb; color:white; padding:25px; text-align:center;}
header h1{margin:0;font-size:2em;}
header p{margin:5px 0 0;}
.container{max-width:700px; margin:auto; padding:20px;}
.card{background:white; padding:20px; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
input, select{width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px; font-size:1em;}
button{background:#2563eb; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; margin-top:10px; font-size:1em;}
button:hover{background:#1e40af;}
ul{padding-left:20px; margin-top:10px;}
footer{background:#111827;color:white;text-align:center;padding:15px; margin-top:20px;}
h2{color:#111827;}
</style>
</head>
<body>

<header>
<h1>বাংলাদেশি বেবি নেম জেনারেটর</h1>
<p>বাবা ও মায়ের নাম দিয়ে সুন্দর, বাস্তবসম্মত শিশু নাম পেতে এখানে নাম জেনারেট করুন।</p>
</header>

<div class="container">
<div class="card">
<h2>নেম জেনারেটর</h2>
<label>বাবার নাম:</label>
<input type="text" id="fatherName" placeholder="বাবার নাম লিখুন">
<label>মায়ের নাম:</label>
<input type="text" id="motherName" placeholder="মায়ের নাম লিখুন">
<label>লিঙ্গ:</label>
<select id="babyGender">
<option value="boy">ছেলে</option>
<option value="girl">মেয়ে</option>
</select>
<button onclick="generateNames()">নাম জেনারেট করুন</button>

<h3>সাজেশন:</h3>
<ul id="nameResults"></ul>
</div>
</div>

<footer>
<p>© ২০২৬ বাংলাদেশি বেবি নেম জেনারেটর | সকল অধিকার সংরক্ষিত</p>
</footer>

<script>
// Common Bangladeshi name syllables in Bengali
const syllables = {
  boy: ["আর","রায়","তান","ইশ","সা","নাফি","রহি","মো","জিয়","হিম","আফি"],
  girl: ["আ","রাহা","সা","না","মি","নী","রু","সুমি","তাহা","দিবা","ফাহিমা"]
};

function generateNames(){
  const father = document.getElementById("fatherName").value.trim();
  const mother = document.getElementById("motherName").value.trim();
  const gender = document.getElementById("babyGender").value;
  const resultUl = document.getElementById("nameResults");
  resultUl.innerHTML = "";

  if(!father || !mother){
    alert("দয়া করে বাবা ও মায়ের নাম উভয় লিখুন।");
    return;
  }

  for(let i=0;i<5;i++){
    const fPart = father.substring(0, Math.min(father.length, Math.floor(Math.random()*Math.ceil(father.length/2))+1));
    const mPart = mother.substring(Math.floor(Math.random()*Math.floor(mother.length/2)), mother.length);
    
    const sylList = gender==="boy"?syllables.boy:syllables.girl;
    const syl = sylList[Math.floor(Math.random()*sylList.length)];
    
    let name = fPart + syl + mPart;
    name = name.charAt(0) + name.slice(1); // বাংলায় capitalize দরকার নেই
    
    const li = document.createElement("li");
    li.textContent = name;
    resultUl.appendChild(li);
  }
}
</script>

</body>
</html>
